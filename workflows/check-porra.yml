name: Check porra semanal

on:
  schedule:
    # Cubre 21:30 hora de Madrid tanto en CET (UTC+1) como en CEST (UTC+2):
    #  - 19:30 UTC -> 20:30 Madrid en CET (invierno) / 21:30 Madrid en CEST (verano)
    #  - 20:30 UTC -> 21:30 Madrid en CET (invierno) / 22:30 Madrid en CEST (verano)
    # Se dejan ambos cron y el propio script descarta la ejecución si no es lunes
    # o si la hora local de Madrid no es la deseada, evitando dobles notificaciones.
    - cron: "30 19 * * 1"
    - cron: "30 20 * * 1"
  workflow_dispatch:
    inputs:
      force:
        description: "Saltar la comprobación de día/hora (solo para pruebas manuales)"
        required: false
        default: "false"
        type: boolean

permissions:
  contents: write

jobs:
  check-porra:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Ejecutar check_porra.py
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          FORCE_RUN: ${{ inputs.force }}
        run: python3 scripts/check_porra.py

      - name: Commit data/week.json si ha cambiado
        run: |
          git config user.name "porra-bot"
          git config user.email "porra-bot@users.noreply.github.com"
          git add data/week.json
          if git diff --cached --quiet; then
            echo "Sin cambios en week.json, no se hace commit."
          else
            git commit -m "Actualizar week.json [skip ci]"
            git push
          fi
